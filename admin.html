<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <main class="contenedor">

    <section id="zonaLogin">
      <section id="login" class="tarjeta">
        <h1>Login administrador</h1>
        <p>Ingresá con tu usuario y contraseña.</p>
        <a href="index.html">Volver</a>

        <form id="formulario-login">
          <input type="text" id="usuario" placeholder="Usuario">
          <input type="password" id="password" placeholder="Contraseña">
          <button type="button" id="btnLogin">Ingresar</button>
        </form>

        <p id="mensaje" class="mensaje-api"></p>
      </section>
    </section>

    <section id="zonaBienvenida" class="tarjeta oculto">
      <h1>Bienvenido</h1>
      <button id="btnSalir">Cerrar sesión</button>
    </section>

    <section id="panel" class="oculto">
      
      <div class="tarjeta form-agregar">
        <h1>Panel de administrador</h1>
        <p>Desde acá podés agregar o eliminar noticias.</p>
        
        <input type="text" id="nuevo-titulo" placeholder="Título de la noticia">
        <input type="text" id="nuevo-imagen" placeholder="URL de la imagen (opcional)">
        <textarea id="nuevo-texto" placeholder="Texto/Descripción de la noticia"></textarea>
        <div style="display:flex;gap:10px;">
          <button id="guardar">Agregar noticia</button>
          <button id="cancelar-edicion" style="display:none;">Cancelar</button>
        </div>
      </div>

     <div class="barra-flotante-acciones">
      <a href="index.html" class="btn-flotante volver">🏠 Inicio</a>
      <button id="btnSalirFlotante" class="btn-flotante salir">🚪 Cerrar Sesión</button>
    </div>
      <div class="seccion-lista-noticias">
        <h2 class="titulo-existentes">Noticias existentes</h2>
        <div id="lista-noticias">
          </div>
      </div>


    </section>

  </main>

  <script src="js/admin.js"></script>
</body>
</html>
